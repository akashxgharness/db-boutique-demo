pipeline:
  name: db-boutique-demo
  identifier: dbboutiquedemo
  projectIdentifier: AkashSandbox
  orgIdentifier: sandbox
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: akashHarnessGitHub
        repoName: db-boutique-demo
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - parallel:
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: build stable frontend
                      identifier: build_stable_frontend
                      spec:
                        connectorRef: Akash_Docker_Hub
                        repo: akashxg/eks-config-ui
                        tags:
                          - frontend
                        caching: true
                        dockerfile: services/frontend/Dockerfile
                        context: services/frontend
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: build product catalog
                      identifier: build_product_catalog
                      spec:
                        connectorRef: Akash_Docker_Hub
                        repo: akashxg/eks-config-ui
                        tags:
                          - catalog
                        caching: true
                        dockerfile: services/productcatalog/Dockerfile
                        context: services/productcatalog
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: build checkout
                      identifier: build_checkout
                      spec:
                        connectorRef: Akash_Docker_Hub
                        repo: akashxg/eks-config-ui
                        tags:
                          - checkout
                        caching: true
                        dockerfile: services/checkout/Dockerfile
                        context: services/checkout
    - stage:
        name: Deploy to Dev
        identifier: Deploy_to_Dev
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: myboutique
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: dev1
            deployToAll: false
            infrastructureDefinitions:
              - identifier: ekscluster
          execution:
            steps:
              - step:
                  type: ServiceNowCreate
                  name: ServiceNow - Create Ticket
                  identifier: ServiceNow_Create_Ticket
                  spec:
                    connectorRef: akashSNOW
                    ticketType: change_request
                    fields:
                      - name: description
                        value: |-
                          Change Summary: Promote <+service.name> to production 
                          Pipeline Name: <+pipeline.name> 
                          Artifact: <+artifact.image> 
                          Deployment URL: <+pipeline.executionUrl> 
                          Requested by <+pipeline.triggeredBy.name>
                      - name: short_description
                        value: Begin promotion of <+service.name> to dev
                    createType: Normal
                  timeout: 10m
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deployment
                  identifier: Rolling_Deployment
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  timeout: 10m
            rollbackSteps: []
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
    - stage:
        name: Approval Gate
        identifier: Approval_Gate
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: ServiceNow Approval
                  identifier: ServiceNow_Approval
                  type: ServiceNowApproval
                  timeout: 1d
                  spec:
                    approvalCriteria:
                      type: KeyValues
                      spec:
                        matchAnyCondition: true
                        conditions:
                          - key: state
                            operator: equals
                            value: Implement
                    rejectionCriteria:
                      type: KeyValues
                      spec:
                        matchAnyCondition: true
                        conditions: []
                    connectorRef: akashSNOW
                    ticketNumber: <+pipeline.stages.Deploy_to_Dev.spec.execution.steps.Change_Mgmt.steps.ServiceNow_Create_Ticket.ticket.ticketNumber>
                    retryInterval: 1m
                    ticketType: change_request
              - step:
                  name: ServiceNow - Update Ticket
                  identifier: ServiceNow_Update_Ticket
                  type: ServiceNowUpdate
                  timeout: 5m
                  spec:
                    useServiceNowTemplate: false
                    connectorRef: akashSNOW
                    ticketType: change_request
                    ticketNumber: <+pipeline.stages.Deploy_to_Dev.spec.execution.steps.Change_Mgmt.steps.ServiceNow_Create_Ticket.ticket.ticketNumber>
                    fields:
                      - name: implementation_plan
                        value: |-
                          Harness Details:
                            Release: <+artifacts.primary.imagePath>:<+artifacts.primary.tag>
                            Deployment URL: <+pipeline.executionUrl>
                            Harness Execution: <+pipeline.executionId>
                      - name: backout_plan
                        value: Harness Automatic Rollback.
                      - name: work_notes
                        value: |-
                          <+env.name> gates passed. 
                          Successfully deployed <+artifacts.primary.imagePath>:<+artifacts.primary.tag> for the <+service.name> service to <+env.name> 
                          Pipeline Execution: <+pipeline.executionUrl> 
                      - name: assignment_group
                        value: CAB Approval
                      - name: justification
                        value: Standard Change Type.
        tags: {}
    - stage:
        name: Deploy to Prod
        identifier: Deploy_to_Prod
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            useFromStage:
              stage: Deploy_to_Dev
          environment:
            useFromStage:
              stage: Deploy_to_Dev
          execution:
            steps:
              - stepGroup:
                  name: Canary Deployment
                  identifier: canaryDeployment
                  steps:
                    - step:
                        name: Canary Deployment
                        identifier: canaryDeployment
                        type: K8sCanaryDeploy
                        timeout: 10m
                        spec:
                          instanceSelection:
                            type: Count
                            spec:
                              count: 1
                          skipDryRun: false
                    - step:
                        name: Canary Delete
                        identifier: canaryDelete
                        type: K8sCanaryDelete
                        timeout: 10m
                        spec: {}
              - stepGroup:
                  name: Primary Deployment
                  identifier: primaryDeployment
                  steps:
                    - step:
                        name: Rolling Deployment
                        identifier: rollingDeployment
                        type: K8sRollingDeploy
                        timeout: 10m
                        spec:
                          skipDryRun: false
            rollbackSteps:
              - step:
                  name: Canary Delete
                  identifier: rollbackCanaryDelete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Rollback
                  identifier: rollingRollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
