pipeline:
  name: db-boutique-demo
  identifier: dbboutiquedemo
  projectIdentifier: AkashSandbox
  orgIdentifier: sandbox
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: akashHarnessGitHub
        repoName: db-boutique-demo
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - parallel:
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: build stable frontend
                      identifier: build_stable_frontend
                      spec:
                        connectorRef: Akash_Docker_Hub
                        repo: akashxg/eks-config-ui
                        tags:
                          - frontend
                        caching: true
                        dockerfile: services/frontend/Dockerfile
                        context: services/frontend
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: build product catalog
                      identifier: build_product_catalog
                      spec:
                        connectorRef: Akash_Docker_Hub
                        repo: akashxg/eks-config-ui
                        tags:
                          - catalog
                        caching: true
                        dockerfile: services/productcatalog/Dockerfile
                        context: services/productcatalog
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: build checkout
                      identifier: build_checkout
                      spec:
                        connectorRef: Akash_Docker_Hub
                        repo: akashxg/eks-config-ui
                        tags:
                          - checkout
                        caching: true
                        dockerfile: services/checkout/Dockerfile
                        context: services/checkout
    - stage:
        name: Deploy to Dev
        identifier: Deploy_to_Dev
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: myboutique
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: dev1
            deployToAll: false
            infrastructureDefinitions:
              - identifier: ekscluster
          execution:
            steps:
              - step:
                  type: K8sCanaryDeploy
                  name: Canary Deployment
                  identifier: Canary_Deployment
                  spec:
                    skipDryRun: false
                    instanceSelection:
                      spec:
                        percentage: 20
                      type: Percentage
                  timeout: 10m
            rollbackSteps: []
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
