# Boutique Helm Chart - simplified deployment (no canary)

canary:
  enabled: false

frontend:
  replicaCount: 2
  port: 8080
  image:
    repository: akashxg/eks-config-ui
    tag: frontend
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

productcatalog:
  enabled: true
  replicaCount: 1
  port: 3550
  image:
    repository: akashxg/eks-config-ui
    tag: catalog
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi

checkout:
  enabled: true
  replicaCount: 1
  port: 5050
  image:
    repository: akashxg/eks-config-ui
    tag: checkout
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  host: boutique.local
  className: nginx
  annotations: {}

namespace: boutique
