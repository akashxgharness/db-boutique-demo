# Boutique Helm Chart - mirrors Harness End2End Delivery Pipeline
# Deploy to Prod uses K8sCanaryDeploy with 5% canary

canary:
  enabled: true
  weight: 5  # mirrors pipeline's instanceSelection.percentage: 5
  image:
    repository: boutique-web-ui
    tag: canary
    pullPolicy: IfNotPresent

stable:
  image:
    repository: boutique-web-ui
    tag: stable
    pullPolicy: IfNotPresent

frontend:
  replicaCount: 2
  canary:
    replicaCount: 1
  port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

productcatalog:
  enabled: true
  replicaCount: 1
  port: 3550
  image:
    repository: boutique-productcatalog
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi

checkout:
  enabled: true
  replicaCount: 1
  port: 5050
  image:
    repository: boutique-checkout
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  host: boutique.local
  className: nginx
  annotations: {}

namespace: boutique
