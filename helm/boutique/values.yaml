# Boutique Helm Chart - with canary deployment and NGINX traffic split

canary:
  enabled: true
  weight: 20  # NGINX canary traffic % (override via --set canary.weight=N to match Harness)
  image:
    repository: akashxg/eks-config-ui
    tag: frontend
    pullPolicy: IfNotPresent

stable:
  image:
    repository: akashxg/eks-config-ui
    tag: frontend
    pullPolicy: IfNotPresent

frontend:
  replicaCount: 2
  canary:
    replicaCount: 1
  port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

productcatalog:
  enabled: true
  replicaCount: 1
  port: 3550
  image:
    repository: akashxg/eks-config-ui
    tag: catalog
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi

checkout:
  enabled: true
  replicaCount: 1
  port: 5050
  image:
    repository: akashxg/eks-config-ui
    tag: checkout
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  host: boutique.local
  className: nginx
  annotations: {}

namespace: boutique
