apiVersion: v1
kind: Service
metadata:
  name: {{ include "boutique.fullname" . }}-frontend-stable
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "boutique.frontendStableSelectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "boutique.frontendStableSelectorLabels" . | nindent 4 }}
